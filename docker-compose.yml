services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: lms_platform
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/lms_platform
      JWT_SECRET: super-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 4000
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://api:4000
    depends_on:
      - api
    environment:
      API_URL: http://api:4000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mysql_data:
